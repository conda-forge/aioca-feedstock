{% set name = "aioca" %}
{% set version = "2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/aioca-{{ version }}.tar.gz
  sha256: 094b815fa26c0fec705ecaf9c1814883b3cf3b5ea973baeb669959661391b5bc

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - numpy
    - epicscorelibs >=7.0.3.99.4.0
    - typing-extensions

test:
  imports:
    - aioca
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/dls-controls/aioca
  summary: Asynchronous Channel Access client for asyncio and Python using libca via ctypes
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jwlodek
    - mrakitin
